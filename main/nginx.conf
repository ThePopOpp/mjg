server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /about {
        try_files /about-us.html =404;
    }

    location = /mission {
        default_type text/html;
        try_files /our-mission =404;
    }

    location = /contact {
        try_files /contact.html =404;
    }

    location = /resources {
        try_files /resources.html =404;
    }

    location = /post {
        try_files /post.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
